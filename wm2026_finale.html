<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WM 2026 Finale Bracket</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#040d1a;font-family:'Segoe UI',Arial,sans-serif;color:#fff;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
#header{background:linear-gradient(90deg,#0a1f3d,#102a4e,#0a1f3d);border-bottom:2px solid #f5c518;padding:10px 16px;text-align:center;}
#header h1{font-size:18px;letter-spacing:3px;color:#f5c518;font-weight:900;}
#header p{font-size:10px;color:#888;letter-spacing:2px;margin-top:2px;}
#status-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:6px;}
#dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;display:inline-block;animation:pulse 2s infinite;}
#dot.loading{background:#f59e0b;box-shadow:0 0 6px #f59e0b;}
#status-text{font-size:11px;color:#aaa;}
#refresh-btn{background:rgba(245,197,24,.15);border:1px solid rgba(245,197,24,.4);color:#f5c518;padding:3px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;}
#bracket-container{
  position:relative;
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
#bracket-img{
  display:block;
  width:1774px;
  height:887px;
}
.overlay{
  position:absolute;
  top:0;left:0;
  width:1774px;
  height:887px;
  pointer-events:none;
}
.mfield{
  position:absolute;
  display:flex;
  flex-direction:column;
  justify-content:space-evenly;
  padding:2px 6px 2px 28px;
}
.mteam{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:11px;
  font-weight:600;
  color:#1a1a2e;
  line-height:1.2;
}
.mteam .tname{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:110px;
}
.mteam .tscore{
  font-weight:700;
  color:#0a2a6e;
  min-width:16px;
  text-align:right;
  font-size:12px;
}
.mteam .tname.tbd{color:#999;font-style:italic;font-size:10px;}
/* Finale field bigger text */
.fin-field .mteam{font-size:14px;}
.fin-field .mteam .tname{max-width:200px;}
</style>
</head>
<body>
<div id="header">
  <h1>⚽ FIFA WM 2026 🏆</h1>
  <p>Kanada · Mexiko · USA &nbsp;·&nbsp; 11. Juni – 19. Juli 2026</p>
  <div id="status-row">
    <span id="dot"></span>
    <span id="status-text">Wird geladen…</span>
    <button id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<div id="bracket-container">
  <img id="bracket-img" src="WM_Finale.png" alt="WM 2026 Bracket"/>
  <div class="overlay" id="overlay"></div>
</div>

<script>
var FLAGS={'Mexico':'🇲🇽','South Korea':'🇰🇷','Czech Republic':'🇨🇿','South Africa':'🇿🇦','Canada':'🇨🇦','Bosnia & Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭','Brazil':'🇧🇷','Morocco':'🇲🇦','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Haiti':'🇭🇹','USA':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turkey':'🇹🇷','Germany':'🇩🇪','Ivory Coast':'🇨🇮','Ecuador':'🇪🇨','Curaçao':'🇨🇼','Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳','Egypt':'🇪🇬','Iran':'🇮🇷','Belgium':'🇧🇪','New Zealand':'🇳🇿','Spain':'🇪🇸','Cape Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾','France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴','Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴','Colombia':'🇨🇴','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿','Portugal':'🇵🇹','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦'};
var DE={'Mexico':'Mexiko','South Korea':'Südkorea','Czech Republic':'Tschechien','South Africa':'Südafrika','Canada':'Kanada','Bosnia & Herzegovina':'Bosnien-H.','Qatar':'Katar','Switzerland':'Schweiz','Brazil':'Brasilien','Morocco':'Marokko','Scotland':'Schottland','Turkey':'Türkei','Germany':'Deutschland','Ivory Coast':'Elfenbeinküste','Curaçao':'Curaçao','Netherlands':'Niederlande','Sweden':'Schweden','Tunisia':'Tunesien','Egypt':'Ägypten','Belgium':'Belgien','New Zealand':'Neuseeland','Spain':'Spanien','Cape Verde':'Kap Verde','Saudi Arabia':'Saudi-Arabien','France':'Frankreich','Iraq':'Irak','Norway':'Norwegen','Argentina':'Argentinien','Algeria':'Algerien','Austria':'Österreich','Jordan':'Jordanien','Colombia':'Kolumbien','DR Congo':'DR Kongo','Uzbekistan':'Usbekistan','Croatia':'Kroatien','Panama':'Panama','England':'England','Ghana':'Ghana'};
function fl(n){return n&&FLAGS[n]?FLAGS[n]+' ':'';}
function dn(n){return n?(DE[n]||n):'TBD';}

// Exakte Positionen der Felder im 1774x887 Bild
var POS={
  SF1: {x:10,y:55,w:175,h:85},   SF2: {x:10,y:155,w:175,h:85},
  SF3: {x:10,y:255,w:175,h:85},  SF4: {x:10,y:355,w:175,h:85},
  SF5: {x:10,y:455,w:175,h:85},  SF6: {x:10,y:555,w:175,h:85},
  SF7: {x:10,y:655,w:175,h:85},  SF8: {x:10,y:755,w:175,h:85},
  AF1: {x:205,y:105,w:180,h:85}, AF2: {x:205,y:305,w:180,h:85},
  AF3: {x:205,y:505,w:180,h:85}, AF4: {x:205,y:705,w:180,h:85},
  VF1: {x:405,y:205,w:170,h:85}, VF2: {x:405,y:605,w:170,h:85},
  HF1: {x:575,y:405,w:155,h:85},
  FINALE: {x:668,y:312,w:440,h:125},
  PLATZ3: {x:648,y:588,w:480,h:125},
  HF2: {x:1045,y:405,w:155,h:85},
  VF3: {x:1200,y:205,w:170,h:85}, VF4: {x:1200,y:605,w:170,h:85},
  AF5: {x:1390,y:105,w:175,h:85}, AF6: {x:1390,y:305,w:175,h:85},
  AF7: {x:1390,y:505,w:175,h:85}, AF8: {x:1390,y:705,w:175,h:85},
  SF9:  {x:1590,y:55,w:175,h:85},  SF10: {x:1590,y:155,w:175,h:85},
  SF11: {x:1590,y:255,w:175,h:85}, SF12: {x:1590,y:355,w:175,h:85},
  SF13: {x:1590,y:455,w:175,h:85}, SF14: {x:1590,y:555,w:175,h:85},
  SF15: {x:1590,y:655,w:175,h:85}, SF16: {x:1590,y:755,w:175,h:85},
};

var allMatches=[];

function setStatus(s,txt){
  document.getElementById('dot').className=s==='loading'?'loading':'';
  document.getElementById('status-text').textContent=txt;
}

function fixApiDate(str){
  if(!str)return'';
  try{var d=new Date(str);if(isNaN(d))return str;var p=function(n){return String(n).padStart(2,'0');};return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes())+':00';}catch(e){return str;}
}

function normalizeMatch(m){
  var t=(m.type||m.stage||m.round||'').toString().toLowerCase();
  var stage='group';
  if(t.includes('r32'))stage='r32';
  else if(t.includes('r16'))stage='r16';
  else if(t.includes('qf')||t.includes('quarter'))stage='qf';
  else if(t.includes('sf')||t.includes('semi'))stage='sf';
  else if(t.includes('3rd')||t.includes('third'))stage='3rd';
  else if(t.includes('final'))stage='final';
  var st=(m.status||'').toLowerCase();
  var finished=m.finished===true||m.finished==='TRUE'||st==='ft'||st==='finished';
  var hs=m.home_score!=null?m.home_score:null;
  var as_=m.away_score!=null?m.away_score:null;
  return{home:m.home_team||m.home||m.team1||'',away:m.away_team||m.away||m.team2||'',
    hs:hs!=null?Number(hs):null,as_:as_!=null?Number(as_):null,
    date:fixApiDate(m.local_date||m.date||''),
    finished:finished,stage:stage,
    group:(m.group||'').toString().toUpperCase().replace(/^GROUP\s*/,'')};
}

function calcStandings(){
  var groups={};
  allMatches.forEach(function(m){
    if(m.stage!=='group'||!m.group)return;
    if(!groups[m.group])groups[m.group]={};
    [m.home,m.away].forEach(function(t){if(t&&!groups[m.group][t])groups[m.group][t]={name:t,pts:0,played:0,w:0,d:0,l:0,gf:0,ga:0};});
    if(!m.finished||m.hs===null)return;
    var t1=groups[m.group][m.home],t2=groups[m.group][m.away];
    if(!t1||!t2)return;
    t1.played++;t2.played++;t1.gf+=m.hs;t1.ga+=m.as_;t2.gf+=m.as_;t2.ga+=m.hs;
    if(m.hs>m.as_){t1.w++;t1.pts+=3;t2.l++;}
    else if(m.as_>m.hs){t2.w++;t2.pts+=3;t1.l++;}
    else{t1.d++;t1.pts++;t2.d++;t2.pts++;}
  });
  var r={};
  Object.keys(groups).sort().forEach(function(g){
    r[g]=Object.values(groups[g]).sort(function(a,b){
      if(b.pts!==a.pts)return b.pts-a.pts;
      return(b.gf-b.ga)-(a.gf-a.ga);
    });
  });
  return r;
}

function renderOverlay(){
  var overlay=document.getElementById('overlay');
  var byStage={};
  allMatches.forEach(function(m){
    if(m.stage==='group')return;
    if(!byStage[m.stage])byStage[m.stage]=[];
    byStage[m.stage].push(m);
  });
  function gs(s,n){var a=byStage[s]||[];while(a.length<n)a.push(null);return a.slice(0,n);}
  var r32=gs('r32',16),r16=gs('r16',8),qf=gs('qf',4),sf=gs('sf',2);
  var fin=gs('final',1)[0],third=gs('3rd',1)[0];

  // Map stage arrays to named slots
  var slots={
    SF1:r32[0],SF2:r32[1],SF3:r32[2],SF4:r32[3],
    SF5:r32[4],SF6:r32[5],SF7:r32[6],SF8:r32[7],
    AF1:r16[0],AF2:r16[1],AF3:r16[2],AF4:r16[3],
    VF1:qf[0],VF2:qf[1],
    HF1:sf[0],
    FINALE:fin,PLATZ3:third,
    HF2:sf[1],
    VF3:qf[2],VF4:qf[3],
    AF5:r16[4],AF6:r16[5],AF7:r16[6],AF8:r16[7],
    SF9:r32[8],SF10:r32[9],SF11:r32[10],SF12:r32[11],
    SF13:r32[12],SF14:r32[13],SF15:r32[14],SF16:r32[15],
  };

  var html='';
  Object.keys(POS).forEach(function(key){
    var p=POS[key];
    var m=slots[key];
    var isFin=key==='FINALE'||key==='PLATZ3';
    var hn=m&&m.home?fl(m.home)+dn(m.home):'TBD';
    var an=m&&m.away?fl(m.away)+dn(m.away):'TBD';
    var hs=m&&m.hs!==null?m.hs:'';
    var as_=m&&m.as_!==null?m.as_:'';
    html+='<div class="mfield'+(isFin?' fin-field':'')+'" style="left:'+p.x+'px;top:'+p.y+'px;width:'+p.w+'px;height:'+p.h+'px;">';
    html+='<div class="mteam"><span class="tname'+((!m||!m.home)?' tbd':'')+'">'+hn+'</span><span class="tscore">'+hs+'</span></div>';
    html+='<div class="mteam"><span class="tname'+((!m||!m.away)?' tbd':'')+'">'+an+'</span><span class="tscore">'+as_+'</span></div>';
    html+='</div>';
  });
  overlay.innerHTML=html;
}

async function fetchWithTimeout(url,ms){
  var ctrl=new AbortController();
  var timer=setTimeout(function(){ctrl.abort();},ms);
  try{var r=await fetch(url,{cache:'no-cache',signal:ctrl.signal});clearTimeout(timer);return r;}
  catch(e){clearTimeout(timer);throw e;}
}

async function loadAll(){
  setStatus('loading','Lade Live-Daten…');
  var APIs=['https://wcup2026.org/api/data.php?action=matches','https://worldcup26.ir/get/games'];
  var loaded=false;
  for(var i=0;i<APIs.length;i++){
    try{
      var r=await fetchWithTimeout(APIs[i],3000);
      if(!r.ok)continue;
      var data=await r.json();
      var raw=data.matches||data.data||data.games||(Array.isArray(data)?data:[]);
      if(Array.isArray(raw)&&raw.length>0){
        var parsed=raw.map(normalizeMatch).filter(function(m){return m.home&&m.away;});
        if(parsed.length>0){allMatches=parsed;loaded=true;break;}
      }
    }catch(e){continue;}
  }
  setStatus('ok',(loaded?'Live':'Eingebaut')+' · '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr');
  renderOverlay();
}

// Eingebaute Daten
allMatches=[
  {home:'Mexico',away:'South Africa',hs:2,as_:0,finished:true,stage:'group',group:'A'},
  {home:'South Korea',away:'Czech Republic',hs:2,as_:1,finished:true,stage:'group',group:'A'},
  {home:'Czech Republic',away:'South Africa',hs:1,as_:1,finished:true,stage:'group',group:'A'},
  {home:'Mexico',away:'South Korea',hs:1,as_:0,finished:true,stage:'group',group:'A'},
  {home:'Czech Republic',away:'Mexico',hs:null,as_:null,finished:false,stage:'group',group:'A'},
  {home:'South Africa',away:'South Korea',hs:null,as_:null,finished:false,stage:'group',group:'A'},
  {home:'Canada',away:'Bosnia & Herzegovina',hs:1,as_:1,finished:true,stage:'group',group:'B'},
  {home:'Qatar',away:'Switzerland',hs:1,as_:1,finished:true,stage:'group',group:'B'},
  {home:'Switzerland',away:'Bosnia & Herzegovina',hs:4,as_:1,finished:true,stage:'group',group:'B'},
  {home:'Canada',away:'Qatar',hs:6,as_:0,finished:true,stage:'group',group:'B'},
  {home:'Switzerland',away:'Canada',hs:null,as_:null,finished:false,stage:'group',group:'B'},
  {home:'Bosnia & Herzegovina',away:'Qatar',hs:null,as_:null,finished:false,stage:'group',group:'B'},
];

renderOverlay();
loadAll();
setInterval(loadAll,60000);
</script>
</body>
</html>
